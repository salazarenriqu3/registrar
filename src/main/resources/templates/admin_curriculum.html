<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Curriculum</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="/css/modern-style.css"></head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header"><span class="sidebar-brand">EAC REGISTRAR</span></div>
            <ul class="list-unstyled components">
                <li><a href="/"><i class="fas fa-home sidebar-icon"></i> Dashboard</a></li>
                <li><a href="/admin"><i class="fas fa-user-shield sidebar-icon"></i> Admin Users</a></li>
                <li class="active"><a href="/admin/curriculum"><i class="fas fa-book sidebar-icon"></i> Curriculum</a></li>
                <li><a href="/logout"><i class="fas fa-sign-out-alt sidebar-icon"></i> Logout</a></li>
            </ul>
        </nav>
        <div id="content">
            <nav class="top-navbar"><button id="sidebarCollapse" class="btn-toggle"><i class="fas fa-bars"></i></button><span class="fw-bold fs-5">Curriculum Management</span></nav>
            <div class="container-fluid p-4">
                <div class="card card-modern p-3 mb-4 bg-warning bg-opacity-10 border-warning">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5>Active Year: <strong th:text="${activeYear}"></strong></h5>
                        <form action="/admin/set-active-year" method="post" class="d-flex"><input type="number" name="year" class="form-control me-2" placeholder="Year"><button class="btn btn-warning">Switch</button></form>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4"><div class="card card-modern p-4">
                        <h5>Add Subject</h5>
                        <form action="/admin/add-course" method="post">
                            <input type="hidden" name="currYear" th:value="${activeYear}">
                            <input type="text" name="code" class="form-control mb-2" placeholder="Code" required>
                            <input type="text" name="desc" class="form-control mb-2" placeholder="Description" required>
                            <div class="row mb-2"><div class="col-6"><input type="number" name="units" class="form-control" value="3"></div>
                            <div class="col-6"><select name="year" class="form-select"><option value="1">1st Yr</option><option value="2">2nd Yr</option></select></div></div>
                            <button class="btn btn-primary w-100">Add to List</button>
                        </form>
                    </div></div>
                    <div class="col-md-8"><div class="card card-modern p-4">
                        <table class="table table-hover"><thead><tr><th>Lvl</th><th>Code</th><th>Desc</th><th>Units</th></tr></thead>
                        <tbody><tr th:each="c:${curriculum}">
                            <td><span class="badge bg-secondary" th:text="${c.year_level}"></span></td>
                            <td class="fw-bold" th:text="${c.course_code}"></td><td th:text="${c.description}"></td><td th:text="${c.units}"></td>
                        </tr></tbody></table>
                    </div></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script><script src="/js/main.js"></script>
</body></html>
