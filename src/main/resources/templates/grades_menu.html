<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-style.css">
    <script>
        function searchClasses() {
            var input = document.getElementById("classSearch");
            var filter = input.value.toUpperCase();
            var cards = document.getElementsByClassName("class-card");
            
            for (var i = 0; i < cards.length; i++) {
                var code = cards[i].getAttribute("data-code").toUpperCase();
                var desc = cards[i].getAttribute("data-desc").toUpperCase();
                if (code.indexOf(filter) > -1 || desc.indexOf(filter) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header"><span class="sidebar-brand">FACULTY</span></div>
            <ul class="list-unstyled components">
                <li><a href="/"><i class="fas fa-home sidebar-icon"></i> Dashboard</a></li>
                <li class="active"><a href="/grades"><i class="fas fa-book sidebar-icon"></i> My Classes</a></li>
                <li><a href="/logout"><i class="fas fa-sign-out-alt sidebar-icon"></i> Logout</a></li>
            </ul>
        </nav>

        <div id="content">
            <nav class="top-navbar">
                <button id="sidebarCollapse" class="btn-toggle"><i class="fas fa-bars"></i></button>
                <span class="fw-bold fs-5">Class Schedule</span>
            </nav>

            <div class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0 text-secondary">My Assigned Classes</h4>
                    <input type="text" id="classSearch" onkeyup="searchClasses()" class="form-control w-25" placeholder="Search subject...">
                </div>

                <div class="row g-4">
                    <div class="col-md-4 class-card" th:each="c : ${classes}" 
                         th:data-code="${c.course_code}" th:data-desc="${c.description}">
                        <div class="card h-100 shadow-sm border-0 hover-effect">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <h5 class="card-title fw-bold text-primary" th:text="${c.course_code}"></h5>
                                    <span class="badge bg-light text-dark border" th:text="${c.section}"></span>
                                </div>
                                <p class="card-text text-muted small" th:text="${c.description}"></p>
                                <hr>
                                <div class="d-flex justify-content-between align-items-center">
                                    <small class="text-secondary">
                                        <i class="far fa-clock me-1"></i> <span th:text="${c.pretty_schedule}"></span>
                                    </small>
                                    <a th:href="@{/grades/view/{id}(id=${c.schedule_id})}" class="btn btn-sm btn-outline-primary">
                                        Open <i class="fas fa-arrow-right ms-1"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-12 text-center mt-5" th:if="${#lists.isEmpty(classes)}">
                        <i class="fas fa-clipboard-list fa-3x text-muted mb-3"></i>
                        <p class="text-muted">No classes assigned to you yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
