<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Study Load (COR)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-style.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header"><span class="sidebar-brand">EAC REGISTRAR</span></div>
            <ul class="list-unstyled components">
                <li><a href="/"><i class="fas fa-home sidebar-icon"></i> Dashboard</a></li>
                <li><a href="/enrollment"><i class="fas fa-book-open sidebar-icon"></i> Enrollment</a></li>
                <li><a href="/my-grades"><i class="fas fa-star sidebar-icon"></i> My Grades</a></li>
                <li class="active"><a href="/my-load"><i class="fas fa-file-invoice sidebar-icon"></i> My COR</a></li>
                <li><a href="/logout"><i class="fas fa-sign-out-alt sidebar-icon"></i> Logout</a></li>
            </ul>
        </nav>

        <div id="content">
            <nav class="top-navbar"><button id="sidebarCollapse" class="btn-toggle"><i class="fas fa-bars"></i></button><span class="fw-bold fs-5">Certificate of Registration</span></nav>
            <div class="container-fluid p-4">
                
                <div class="card card-modern p-5">
                    <div class="text-center mb-5">
                        <h2 class="fw-bold">OFFICIAL STUDY LOAD</h2>
                        <h5 class="text-muted" th:text="${studentName}"></h5>
                        <div class="badge bg-success mt-2">Active Student</div>
                    </div>

                    <table class="table table-bordered align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Subject Code</th>
                                <th>Section</th>
                                <th>Schedule</th>
                                <th>Status</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${myClasses}">
                                <td class="fw-bold" th:text="${c.course_code}"></td>
                                <td th:text="${c.section}"></td>
                                <td>
                                    <span th:text="${c.pretty_schedule}"></span>
                                </td>
                                <td>
                                    <span th:if="${c.enrollment_status == 'APPROVED'}" class="badge bg-success">Enrolled</span>
                                    <span th:if="${c.enrollment_status == 'PENDING'}" class="badge bg-warning text-dark">Pending Adviser</span>
                                </td>
                                <td class="text-center">
                                    <form action="/drop" method="post" onsubmit="return confirm('Are you sure you want to drop this subject?');">
                                        <input type="hidden" name="scheduleId" th:value="${c.schedule_id}">
                                        <button class="btn btn-outline-danger btn-sm">
                                            <i class="fas fa-trash-alt"></i> Drop
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${myClasses.empty}"><td colspan="5" class="text-center text-muted p-4">You have not enrolled in any subjects yet.</td></tr>
                        </tbody>
                    </table>

                    <div class="row mt-5">
                        <div class="col-6 text-center">
                            <p class="border-top pt-2 w-75 mx-auto">Student Signature</p>
                        </div>
                        <div class="col-6 text-center">
                            <p class="border-top pt-2 w-75 mx-auto">Registrar Signature</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script><script src="/js/main.js"></script>
</body>
</html>
