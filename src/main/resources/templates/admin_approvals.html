<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Approvals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-style.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header"><span class="sidebar-brand">ADMIN</span></div>
            <ul class="list-unstyled components">
                <li><a href="/"><i class="fas fa-home sidebar-icon"></i> Dashboard</a></li>
                <li><a href="/admin/student-manager"><i class="fas fa-user-graduate sidebar-icon"></i> Student Manager</a></li>
                <li><a href="/admin/users"><i class="fas fa-user-shield sidebar-icon"></i> Users</a></li>
                <li class="active"><a href="/admin/approvals"><i class="fas fa-check-circle sidebar-icon"></i> Approvals</a></li>
                <li><a href="/admin/classes"><i class="fas fa-chalkboard-teacher sidebar-icon"></i> Classes</a></li>
                <li><a href="/logout"><i class="fas fa-sign-out-alt sidebar-icon"></i> Logout</a></li>
            </ul>
        </nav>

        <div id="content">
            <nav class="top-navbar">
                <button id="sidebarCollapse" class="btn-toggle"><i class="fas fa-bars"></i></button>
                <span class="fw-bold fs-5">Approvals Center</span>
            </nav>

            <div class="container-fluid p-4">
                <div class="mb-3">
                    <a href="/" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Back to Dashboard</a>
                </div>

                <div class="card card-modern p-4 mb-4 border-start border-5 border-success">
                    <h5 class="mb-3 text-success"><i class="fas fa-file-contract me-2"></i> Class Grade Submissions</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light"><tr><th>Subject</th><th>Faculty</th><th>Schedule</th><th class="text-center">Action</th></tr></thead>
                            <tbody>
                                <tr th:each="c : ${pendingClasses}">
                                    <td><strong th:text="${c.course_code}"></strong></td>
                                    <td th:text="${c.faculty_name}"></td>
                                    <td class="small" th:text="${c.pretty_schedule}"></td>
                                    <td class="text-center">
                                        <a th:href="@{/admin/classes/view/{id}(id=${c.schedule_id})}" class="btn btn-sm btn-outline-primary" target="_blank"><i class="fas fa-eye"></i></a>
                                        <form action="/admin/approve-class" method="post" class="d-inline ms-2"><input type="hidden" name="scheduleId" th:value="${c.schedule_id}"><button class="btn btn-sm btn-success">Approve</button></form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(pendingClasses)}"><td colspan="4" class="text-center text-muted small py-3">No pending class submissions.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card card-modern p-4">
                    <h5 class="mb-3 text-danger"><i class="fas fa-edit me-2"></i> Grade Change Requests</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light"><tr><th>Faculty</th><th>Student</th><th>Course</th><th>Request</th><th>Reason</th><th>Action</th></tr></thead>
                            <tbody>
                                <tr th:each="r : ${requests}">
                                    <td th:text="${r.faculty}"></td>
                                    <td th:text="${r.student_name}"></td>
                                    <td th:text="${r.course_code}"></td>
                                    <td th:text="${r.new_grade}" class="fw-bold text-primary"></td>
                                    <td th:text="${r.reason}" class="small"></td>
                                    <td>
                                        <form action="/admin/approve-change" method="post" class="d-inline"><input type="hidden" name="requestId" th:value="${r.request_id}"><button class="btn btn-sm btn-success"><i class="fas fa-check"></i></button></form>
                                        <form action="/admin/reject-change" method="post" class="d-inline"><input type="hidden" name="requestId" th:value="${r.request_id}"><button class="btn btn-sm btn-danger"><i class="fas fa-times"></i></button></form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(requests)}"><td colspan="6" class="text-center text-muted small py-3">No pending requests.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
