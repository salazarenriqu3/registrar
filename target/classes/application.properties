spring.application.name=RegistrarSubsystem
server.port=8080

# FORCE connection to the V2 database
spring.datasource.url=jdbc:mysql://localhost:3306/registrar_db_v2?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# USE THE SAME USER AS WORKBENCH (Usually 'root')
spring.datasource.username=root
spring.datasource.password=
# ^^^ If you have no password in Workbench, leave this empty like: spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Disable Hibernate auto-updates so it doesn't mess up your tables
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
# Add this to the bottom of your existing application.properties
server.servlet.session.tracking-modes=cookie
# Allow uploading larger receipt images
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB