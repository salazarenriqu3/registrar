<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Enrollment Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/modern-style.css">
</head>
<body class="bg-light">
    <div class="wrapper">
        <nav id="sidebar">
            <div class="sidebar-header"><span class="sidebar-brand">EAC REGISTRAR</span></div>
            <ul class="list-unstyled components">
                <li><a href="/"><i class="fas fa-home sidebar-icon"></i> Dashboard</a></li>
                <li class="active"><a href="/admin/enrollment"><i class="fas fa-clipboard-list sidebar-icon"></i> Enrollment Hub</a></li>
                <li><a href="/admin/payments"><i class="fas fa-money-check-alt sidebar-icon"></i> Payment Approvals</a></li>
                <li><a href="/admin/student-manager"><i class="fas fa-user-graduate sidebar-icon"></i> Student Manager</a></li>
                <li><a href="/admin/approvals"><i class="fas fa-check-circle sidebar-icon"></i> Grade Approvals</a></li>
                <li><a href="/logout"><i class="fas fa-sign-out-alt sidebar-icon"></i> Logout</a></li>
            </ul>
        </nav>

        <div id="content">
            <nav class="top-navbar"><span class="fw-bold fs-5">Enrollment Hub</span></nav>

            <div class="container-fluid p-4">
                
                <div th:if="${errorMsg}" class="alert alert-danger fw-bold shadow-sm">
                    <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${errorMsg}"></span>
                </div>

                <div class="card card-modern p-4 mb-4">
                    <div class="row align-items-center">
                        <div class="col-md-5 border-end position-relative">
                            <label class="small fw-bold text-muted mb-2">SELECT STUDENT TO ENROLL</label>
                            <div class="search-wrapper position-relative">
                                <input type="text" id="nameSearch" class="form-control mb-2" placeholder="Search Name..." onkeyup="fetchSuggestions()" autocomplete="off">
                                <div id="suggestions" class="suggestions-box"></div>
                            </div>
                            <form action="/admin/enrollment" method="get" class="d-flex gap-2 mt-2" style="position: relative; z-index: 0;">
                                <input type="text" id="idSearchBox" name="username" class="form-control fw-bold" placeholder="Enter ID..." th:value="${student?.username}">
                                <button class="btn btn-success"><i class="fas fa-search"></i> Proceed to Enroll</button>
                            </form>
                            <div class="text-danger small mt-2" th:if="${message}" th:text="${message}"></div>
                        </div>

                        <div class="col-md-7 ps-4" th:if="${student != null}">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h3 class="fw-bold mb-0 text-success" th:text="${student.real_name}"></h3>
                                    <span class="badge bg-secondary fs-6" th:text="${student.username}"></span>
                                </div>
                                <div class="text-end">
                                    <small class="text-muted d-block fw-bold">TOTAL UNITS</small>
                                    <h4 class="fw-bold mb-0" th:text="${totalUnits}"></h4>
                                </div>
                            </div>
                            <div class="mt-2 small text-secondary">
                                <strong>Program:</strong> <span th:text="${student.program_code}"></span> | 
                                <strong>Year:</strong> <span th:text="${student.year_level}"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4" th:if="${student != null}">
                    
                    <div class="col-md-7">
                        <div class="card card-modern border-top-0 rounded-top-0 border-success border-2">
                            <div class="card-header bg-success text-white fw-bold">
                                <i class="fas fa-plus-circle me-2"></i> AVAILABLE SUBJECTS
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead class="table-light sticky-top">
                                            <tr>
                                                <th>Subject</th>
                                                <th>Schedule</th>
                                                <th class="text-center">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="c : ${classes}">
                                                <td>
                                                    <strong th:text="${c.course_code}"></strong> <span class="badge bg-secondary" th:text="${c.section}"></span><br>
                                                    <small class="text-muted" th:text="${c.description}"></small>
                                                </td>
                                                <td class="small" th:text="${c.pretty_schedule}"></td>
                                                <td class="text-center">
                                                    <form th:if="${!c.is_disabled}" action="/admin/process-enrollment" method="post">
                                                        <input type="hidden" name="studentId" th:value="${student.user_id}">
                                                        <input type="hidden" name="scheduleId" th:value="${c.schedule_id}">
                                                        <button class="btn btn-sm btn-success fw-bold shadow-sm px-3">Enroll</button>
                                                    </form>
                                                    <button th:if="${c.is_disabled}" class="btn btn-sm btn-secondary px-3" disabled>Enrolled</button>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <div class="card card-modern border-top-0 rounded-top-0 border-secondary border-2">
                            <div class="card-header bg-secondary text-white fw-bold">
                                <i class="fas fa-list me-2"></i> CURRENT ENROLLED LOAD
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                                    <table class="table table-hover align-middle mb-0">
                                        <thead class="table-light sticky-top">
                                            <tr>
                                                <th>Code</th>
                                                <th>Schedule</th>
                                                <th class="text-center">Drop</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="load : ${studentLoad}">
                                                <td class="fw-bold text-success" th:text="${load.course_code}"></td>
                                                <td class="small text-muted" th:text="${load.pretty_schedule}"></td>
                                                <td class="text-center">
                                                    <form action="/admin/enrollment-drop" method="post" onsubmit="return confirm('Remove this subject from the student?');">
                                                        <input type="hidden" name="studentId" th:value="${student.user_id}">
                                                        <input type="hidden" name="scheduleId" th:value="${load.schedule_id}">
                                                        <button class="btn btn-sm text-danger"><i class="fas fa-times-circle"></i></button>
                                                    </form>
                                                </td>
                                            </tr>
                                            <tr th:if="${#lists.isEmpty(studentLoad)}">
                                                <td colspan="3" class="text-center py-4 text-muted">No subjects currently enrolled.</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div class="card-footer bg-white text-end">
                                <a th:href="@{/admin/print-cor(username=${student.username})}" target="_blank" class="btn btn-primary fw-bold shadow-sm">
                                    <i class="fas fa-print me-2"></i> Generate COR
                                </a>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let debounceTimer;
        function fetchSuggestions() {
            const query = document.getElementById("nameSearch").value;
            const box = document.getElementById("suggestions");
            if (query.length < 2) { box.style.display = "none"; return; }
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                fetch(`/api/search-students?query=${query}`).then(r => r.json()).then(data => {
                    box.innerHTML = "";
                    if (data.length > 0) {
                        box.style.display = "block";
                        data.forEach(s => {
                            let div = document.createElement("div");
                            div.className = "suggestion-item"; 
                            div.style.cursor = "pointer";
                            div.innerHTML = `<span class="student-name">${s.real_name}</span> <span class="badge bg-light text-dark border student-id">${s.username}</span>`;
                            div.onclick = () => {
                                document.getElementById("nameSearch").value = s.real_name; 
                                document.getElementById("idSearchBox").value = s.username; 
                                box.style.display = "none"; 
                                document.querySelector("#idSearchBox + button").click(); 
                            };
                            box.appendChild(div);
                        });
                    } else { box.style.display = "none"; }
                });
            }, 300);
        }
    </script>
</body>
</html>
